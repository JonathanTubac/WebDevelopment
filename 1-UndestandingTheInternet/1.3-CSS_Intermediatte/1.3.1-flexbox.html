<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flexbox</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
        }

        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-content: center;
            gap: 15px;
            padding: 20px;
        }

        .card {
            width: 200px;
            height: 200px;
            background-color: rgba(203, 198, 120, 1);
            flex: 1 3 300px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-direction: column;
        }

        .yellow {
            background-color: yellow;
            order: 4;
        }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card yellow">1</div>
      <div class="card">2</div>
      <div class="card">3</div>
      <div class="card">
        <h1>Hola</h1>
        <p>1</p>
        <p>2</p>
      </div>
      <div class="card">5</div>
      <div class="card">6</div>
      <div class="card">7</div>
      <div class="card">8</div>
      <div class="card">9</div>
    </div>
  </body>
</html>
