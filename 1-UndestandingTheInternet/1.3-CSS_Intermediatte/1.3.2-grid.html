<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grid</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
      }

      .flex-container {
        width: 100%;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .grid-container {
        display: grid;
        width: 80%;
        height: 80vh;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 1fr 1fr;
        gap: 15px;
      }

      .card {
        width: 100%;
        height: 100%;
        background-color: rgba(203, 198, 120, 1);
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        border-radius: 20px;
        box-shadow: 0px 0px 5px 5px #a2c551;
      }

      #c-1 {
        grid-area: 1 / 1 / 3 / 1;
      }
    </style>
  </head>
  <body>
    <div class="flex-container">
      <div class="grid-container">
        <div class="card" id="c-1">1</div>
        <div class="card" id="c-2">2</div>
        <div class="card" id="c-3">3</div>
      </div>
    </div>
  </body>
</html>
