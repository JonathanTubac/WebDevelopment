<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PSEUDO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap"
      rel="stylesheet"
    />
    <style type="text/css">
      :root {
        --background-1: antiquewhite;
        --background-btn:  rgba(150, 100, 0, 1);
        --text-primary: white;
      }

      .dark {
        --background-1: rgb(59, 59, 59);
        --background-btn: #362e24;
      }
      * {
        box-sizing: border-box;
      }

      @keyframes pulso {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.2);
        }
        100% {
          transform: scale(1);
        }
      }

      @keyframes rotar {
        0% {
          transform: rotateY(0);
        }
        50% {
          transform: rotateY(180deg);
        }
        100% {
          transform: rotateY(360deg);
        }
      }
      body {
        margin: 0;
        background-color: var(--background-1);
      }

      .card {
        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
        width: 200px;
        height: 100px;
        background-color: var(--background-btn);
        border-radius: 25px;
        color: var(--text-primary);
        box-shadow: 0px 0px 15px 1px black;
        font-family: "Luckiest Guy";
        font-size: 1.4em;
        cursor: pointer;
        z-index: 100;
        transition: all 2s;
        overflow: hidden;
      }

      .container {
        display: flex;
        align-content: center;
        justify-content: center;
        flex-wrap: wrap;
        height: 100vh;
        gap: 20px;
        perspective: 500px;
      }

      .div1:hover {
        background-color: rgb(199, 158, 75);
        color: black;
      }

      .div2:active {
        margin-bottom: 100px;
      }

      .div2:hover {
        transform: rotateY(30deg);
      }
      .div3:focus {
        background-color: rgb(199, 158, 75);
      }

      input:disabled {
        background-color: #c09a9a;
        cursor: no-drop;
      }

      input:checked {
        width: 50px;
        height: 50px;
        cursor: progress;
      }

      .div1::before {
        position: absolute;
        content: "";
        top: 0;
        left: -100%;
        width: 100%;
        height: 50%;
        background-color: rgb(94, 78, 58);
        z-index: -100;
        transition: all 1s;
      }

      .div1::after {
        position: absolute;
        content: "";
        width: 100%;
        height: 50%;
        background-color: #a07f7f;
        top: 50%;
        left: 100%;
        z-index: -100;
        transition: all 1s;
      }

      .div1:hover::before {
        left: 100%;
      }

      .div1:hover::after {
        left: -100%;
      }

      @media (max-width: 400px) {
        .card {
          width: 100vw;
          margin: 0 20px 0 20px;
        }
      }
    </style>
  </head>
  <body class="">
    <div class="container">
      <div class="card div1">Hover Me!</div>
      <div class="card div2">Click Me!</div>
      <button class="card div3">Focus on me!</button>
      <button class="card" id="toggle">Toggle theme</button>
    </div>
    <script>
        const body = document.querySelector('body')
        const toggle_btn = document.querySelector('#toggle')

        toggle_btn.addEventListener("click", ()=>{
            body.classList.toggle('dark')
        })
    </script>
  </body>
</html>
