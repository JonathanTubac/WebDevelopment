<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Audio</title>
  </head>
  <body>
    <br />
    <br />
    <audio
      src="audio.wav"
      style="width: 500px"
      autoplay
      controls
      loop
      muted
    ></audio>

    <iframe
      width="560"
      height="315"
      src="https://www.youtube.com/embed/JoIPhbdtGf8?si=mw1baSQRn8Wq_104&amp;start=60"
      title="YouTube video player"
      frameborder="0"
      allow="
        accelerometer;
        autoplay;
        clipboard-write;
        encrypted-media;
        gyroscope;
        picture-in-picture;
        web-share;
      "
      referrerpolicy="strict-origin-when-cross-origin"
      allowfullscreen
    ></iframe>

    <video src="raid.mp4" controls style="width: 300px"></video>

    <iframe
      src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d30876.755496725895!2d-90.63976049423219!3d14.678942535715347!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8589752cfb2e0405%3A0xf13cf48af6d85ba8!2sEl%20mirador%20Vista%20Hermosa%2C%20San%20Pedro%20Sacatep%C3%A9quez%20Guatemala!5e0!3m2!1ses-419!2sgt!4v1780969557621!5m2!1ses-419!2sgt"
      width="600"
      height="450"
      style="border: 0"
      allowfullscreen=""
      loading="lazy"
      referrerpolicy="no-referrer-when-downgrade"
    ></iframe>
  </body>
</html>
